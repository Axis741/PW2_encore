<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <link rel="stylesheet" href="estilos/sProducto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="logo">
        <img src="images/" alt="Logo">
    </div>

    <nav>
        <a href="Home.html">MERCH</a>
        <a href="Eventos.html">EVENTOS</a>
        <a href="Artistas.html">ARTISTAS/BANDAS</a>
    </nav>

    <div class="icons">
        <a href="Perfil.html"><i class="fa-solid fa-user"></i></a>
        <a href="Cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
    </div>
</header>

<main class="product-container">

    <!-- Imagen grande -->
    <div class="product-image">
        <img src="https://shop.imaginedragonsmusic.com/cdn/shop/files/PRODUCT_IMDR_ECOMM_25_FIREINTHESEHILLS_HOODIE_ADULT_B.png?v=1763060643&width=1080" alt="Tshirt">
    </div>

    <!-- Info -->
    <div class="product-info">
        <h1>T Shirt - Toxicity</h1>
        <h2>$35.69</h2>

        <div class="sizes">
            <p>SIZE</p>
            <div class="size-options">
                <button>S</button>
                <button>M</button>
                <button>L</button>
                <button>XL</button>
                <button>2XL</button>
            </div>
        </div>

        <p><strong>Status:</strong> In Stock</p>
        <p><strong>Delivery:</strong> Arrives in 3-5 days</p>

        <div class="buy-section">
            <button class="add-cart">
                <i class="fa-solid fa-cart-shopping"></i>
            </button>

            <select>
                <option>1</option>
                <option>2</option>
                <option>3</option>
            </select>
        </div>

        <div class="description">
            <h3>Product Description</h3>
            <ul>
                <li>100% Cotton</li>
                <li>Crew Neck</li>
                <li>Machine Wash</li>
                <li>Regular Fit</li>
                <li>Screen Print Design</li>
            </ul>
        </div>

    </div>

</main>

</body>
</html>
